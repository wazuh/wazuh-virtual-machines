run-name: Build OVA ${{ inputs.id }} ${{ inputs.is_stage && ' - is stage' || '' }}${{ inputs.checksum && ' - checksum' || '' }} - Branch ${{ github.ref_name }} - Launched by @${{ github.actor }}
name: Build OVA

on:
  workflow_dispatch:
    inputs:
      id:
        description: "ID used to identify the workflow uniquely."
        type: string
        required: false
      checksum:
        type: boolean
        description: |
          Generate package checksum.
          Default is 'false'.
        required: false
      wazuh_virtual_machines_reference:
        description: 'Branch or tag of the wazuh-virtual-machines repository'
        required: true
      wazuh_automation_reference:
        description: 'Branch or tag of the wazuh-automation repository'
        required: true
        default: 'main'
      is_stage:
        description: "Is stage?"
        type: boolean
        default: false
      ova_revision:
        type: string
        description: 'Revision of the OVA file. Use "0" for development builds'
        required: true
        default: '0'
      wazuh_package_type:
        description: 'Wazuh package type to be used in the OVA'
        required: true
        default: 'dev'
        type: choice
        options:
          - prod
          - pre-prod
          - dev
      commit_list:
        description: |
          'Wazuh components revisions (comma-separated string list) ["indexer-revision", "manager-revision", "dashboard-revision", "agent-revision", "assistant-revision"]'
          (Only needed if the Wazuh package type is dev-latest or dev-commit)
        required: true
        default: '["latest", "latest", "latest", "latest", "latest"]'
        type: string
      destroy:
        description: 'Destroy the base instance after the OVA is created'
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      id:
        type: string
        required: false
      checksum:
        type: boolean
        required: false
      wazuh_virtual_machines_reference:
        type: string
        required: true
      wazuh_automation_reference:
        type: string
        required: false
        default: 'main'
      is_stage:
        type: boolean
        required: false
        default: false
      ova_revision:
        type: string
        required: false
        default: '0'
      wazuh_package_type:
        type: string
        required: false
        default: 'dev'
      commit_list:
        type: string
        required: false
        default: '["latest", "latest", "latest", "latest", "latest"]'
      destroy:
        type: boolean
        required: false
        default: true
      is_pr_check:
        type: boolean
        required: false
        default: false
    outputs:
      ova_s3_path:
        description: 'S3 URI of the built OVA'
        value: ${{ jobs.build.outputs.ova_s3_path }}
      ova_revision:
        description: 'Revision of the built OVA'
        value: ${{ inputs.ova_revision }}

env:
    COMPOSITE_NAME: "amazon-2023-amd64"
    INSTANCE_TYPE: "metal"
    AWS_REGION: "us-east-1"
    ALLOCATOR_PATH: "/tmp/allocatorvm_ova"
    WORKFLOW_VENV: "${{ github.workspace }}/workflow_venv"
    S3_BUCKET_TO_STORE_OVA: ${{ vars.AWS_S3_BUCKET }}
    S3_PATH_TO_STORE_OVA: "development/wazuh/5.x/secondary/ova"
    COMMIT_LIST: ${{ inputs.commit_list }}
    PROD_ARTIFACT_URLS_BUCKET: ${{ vars.AWS_S3_BUCKET_PROD }}
    PRE_PROD_ARTIFACT_URLS_BUCKET: ${{ vars.AWS_S3_BUCKET_PRE }}
    ARTIFACT_URLS_FILENAME: "artifact_urls.yml"
    LOCAL_ARTIFACT_URLS_FILEPATH: /tmp/artifact_urls.yml
    GENERATE_PRESIGNED_URLS_SCRIPT_PATH: ${{ github.workspace }}/wazuh-automation/tools/sign_urls/generate_presigned_dev_urls.py
    PRESIGNED_URLS_SCRIPT_PROCESS: "build_ova"
    WVM_REPO_NAME: ${{ github.event.repository.name }}
    WVM_REPOSITORY_PATH: "https://github.com/${{ github.repository }}.git"
    OVA_SCRIPTS_PATH: "${{ github.workspace }}/utils/scripts/ova_build"
    OVA_SET_DEFAULT_SCRIPT_NAME: "setOVADefault.sh"
    OVA_OVF_TEMPLATE_NAME: "wazuh_ovf_template"
    BOX_DEFAULT_NAME: "al2023"

permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout

jobs:
  build:
    runs-on:
      group: wz-linux-amd64
    outputs:
      ova_matrix: ${{ steps.set_filenames.outputs.ova_matrix }}
      box_matrix: ${{ steps.set_filenames.outputs.box_matrix }}
      ova_source_filename: ${{ steps.set_filenames.outputs.ova_source_filename }}
      box_source_filename: ${{ steps.set_filenames.outputs.box_source_filename }}
      ova_s3_path: ${{ steps.set_filenames.outputs.ova_s3_path }}
    steps:
      - name: View parameters
        run: echo "${{ toJson(inputs) }}"

      - name: Checkout wazuh/wazuh-virtual-machines repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.wazuh_virtual_machines_reference }}

      - name: Checkout wazuh/wazuh-automation repository
        uses: actions/checkout@v4
        with:
          repository: wazuh/wazuh-automation
          ref: ${{ inputs.wazuh_automation_reference }}
          token: ${{ secrets.GH_CLONE_TOKEN }}
          path: wazuh-automation

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_OVA_ROLE }}
          role-session-name: "OVA-Builder"
          aws-region: "${{ env.AWS_REGION }}"
          role-duration-seconds: 18000 # Set the duration of the role session to 5 hours

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install and configure python and workflow dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          sudo wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq
          sudo apt-get install -y python3-venv
          python3 -m venv ${{ env.WORKFLOW_VENV }}
          source ${{ env.WORKFLOW_VENV }}/bin/activate
          pip install --upgrade pip
          pip install pyyaml

      - name: Get Wazuh version
        run: |
          WAZUH_VERSION=$(jq -r '.version' VERSION.json)
          WAZUH_MAJOR=$(echo "$WAZUH_VERSION" | cut -d '.' -f 1)
          WAZUH_MINOR=$(echo "$WAZUH_VERSION" | cut -d '.' -f 1-2)
          echo WAZUH_VERSION=$WAZUH_VERSION >> $GITHUB_ENV
          echo WAZUH_MAJOR=$WAZUH_MAJOR >> $GITHUB_ENV
          echo WAZUH_MINOR=$WAZUH_MINOR >> $GITHUB_ENV

      - name: Setting FILENAME var
        id: set_filenames
        run: |
          COMMIT_SHA=$(git rev-parse --short ${{ github.sha }})

          if [ ${{ inputs.is_stage }} == true ]; then
            # Stage build: wazuh-5.0.0-1
            FILENAME_OVA="wazuh-${{ env.WAZUH_VERSION }}-${{ inputs.ova_revision }}.ova"
            FILENAME_BOX="ova-${{ env.BOX_DEFAULT_NAME }}-base-${{ env.WAZUH_VERSION }}-${{ inputs.ova_revision }}.box"
            OVA_MATRIX=$(jq -nc '[{"filename": $f}]' --arg f "$FILENAME_OVA")
            BOX_MATRIX=$(jq -nc '[{"filename": $f}]' --arg f "$FILENAME_BOX")
          else
            # Dev build: both latest and commit versions
            FILENAME_OVA="wazuh-${{ env.WAZUH_VERSION }}-${{ inputs.ova_revision }}_${COMMIT_SHA}.ova"
            FILENAME_BOX="ova-${{ env.BOX_DEFAULT_NAME }}-base-${{ env.WAZUH_VERSION }}-${{ inputs.ova_revision }}_${COMMIT_SHA}.box"
            FILENAME_OVA_LATEST="wazuh-${{ env.WAZUH_VERSION }}-latest.ova"
            FILENAME_BOX_LATEST="ova-${{ env.BOX_DEFAULT_NAME }}-base-${{ env.WAZUH_VERSION }}-latest.box"
            OVA_MATRIX=$(jq -nc '[{"filename": $f1}, {"filename": $f2}]' --arg f1 "$FILENAME_OVA" --arg f2 "$FILENAME_OVA_LATEST")
            BOX_MATRIX=$(jq -nc '[{"filename": $f1}, {"filename": $f2}]' --arg f1 "$FILENAME_BOX" --arg f2 "$FILENAME_BOX_LATEST")
          fi

          echo "FILENAME_OVA=$FILENAME_OVA" >> $GITHUB_ENV
          echo "FILENAME_BOX=$FILENAME_BOX" >> $GITHUB_ENV
          echo "ova_matrix=$OVA_MATRIX" >> $GITHUB_OUTPUT
          echo "box_matrix=$BOX_MATRIX" >> $GITHUB_OUTPUT
          echo "ova_source_filename=$FILENAME_OVA" >> $GITHUB_OUTPUT
          echo "box_source_filename=$FILENAME_BOX" >> $GITHUB_OUTPUT

          OVA_S3_PATH="s3://${{ env.S3_BUCKET_TO_STORE_OVA }}/${{ env.S3_PATH_TO_STORE_OVA }}/$FILENAME_OVA"
          echo "ova_s3_path=$OVA_S3_PATH" >> $GITHUB_OUTPUT

      - name: Install and set allocator requirements
        run: |
          pip3 install -r wazuh-automation/deployability/deps/requirements.txt

      - name: Execute allocator module that will create the base instance
        id: alloc_vm_ova
        run: |
          python3 wazuh-automation/deployability/modules/allocation/main.py --action create --provider aws --size ${{ env.INSTANCE_TYPE }} --composite-name ${{ env.COMPOSITE_NAME }} --working-dir ${{ env.ALLOCATOR_PATH }} \
            --track-output ${{ env.ALLOCATOR_PATH }}/track.yml --inventory-output ${{ env.ALLOCATOR_PATH }}/inventory.yml --instance-name gha_${{ github.run_id }}_ova_build \
            --label-team devops --label-termination-date 1d

          INSTANCE_HOSTNAME=$(yq '.all.hosts.[].ansible_host' ${{ env.ALLOCATOR_PATH }}/inventory.yml)
          INSTANCE_PORT=$(yq '.all.hosts.[].ansible_port' ${{ env.ALLOCATOR_PATH }}/inventory.yml)
          INSTANCE_KEY=$(yq '.all.hosts.[].ansible_ssh_private_key_file' ${{ env.ALLOCATOR_PATH }}/inventory.yml)
          INSTANCE_USER=$(yq '.all.hosts.[].ansible_user' ${{ env.ALLOCATOR_PATH }}/inventory.yml)
          echo INSTANCE_HOSTNAME=$INSTANCE_HOSTNAME >> $GITHUB_ENV
          echo INSTANCE_PORT=$INSTANCE_PORT >> $GITHUB_ENV
          echo INSTANCE_KEY=$INSTANCE_KEY >> $GITHUB_ENV
          echo INSTANCE_USER=$INSTANCE_USER >> $GITHUB_ENV

      - name: Get artifacts URLs file
        run: |
          if [ "${{ inputs.wazuh_package_type }}" == "prod" ]; then
            aws s3api get-object --bucket ${{ env.PROD_ARTIFACT_URLS_BUCKET }} --key ${{ env.WAZUH_MINOR }}/${{ env.ARTIFACT_URLS_FILENAME }} $LOCAL_ARTIFACT_URLS_FILEPATH
          elif [ "${{ inputs.wazuh_package_type }}" == "pre-prod" ]; then
            aws s3api get-object --bucket ${{ env.PRE_PROD_ARTIFACT_URLS_BUCKET }} --key ${{ env.WAZUH_MINOR }}/${{ env.ARTIFACT_URLS_FILENAME }} $LOCAL_ARTIFACT_URLS_FILEPATH
          else
            LOCAL_AWS_S3_BUCKET_DEV=${{ vars.AWS_S3_BUCKET_DEV }}
            echo LOCAL_AWS_S3_BUCKET_DEV=$LOCAL_AWS_S3_BUCKET_DEV >> $GITHUB_ENV
          fi

      - name: Generate presigned URLs for artifacts for dev packages
        if: inputs.wazuh_package_type == 'dev'
        run: |
          INDEXER_REVISION=$(echo "$COMMIT_LIST" | jq -r '.[0]')
          MANAGER_REVISION=$(echo "$COMMIT_LIST" | jq -r '.[1]')
          DASHBOARD_REVISION=$(echo "$COMMIT_LIST" | jq -r '.[2]')
          AGENT_REVISION=$(echo "$COMMIT_LIST" | jq -r '.[3]')
          ASSISTANT_REVISION=$(echo "$COMMIT_LIST" | jq -r '.[4]')

          python ${{ env.GENERATE_PRESIGNED_URLS_SCRIPT_PATH }} \
            --process ${{ env.PRESIGNED_URLS_SCRIPT_PROCESS }} \
            --wazuh-version ${{ env.WAZUH_VERSION }} \
            --aws-s3-bucket-dev ${{ env.LOCAL_AWS_S3_BUCKET_DEV }} \
            --indexer-revision   $INDEXER_REVISION \
            --manager-revision   $MANAGER_REVISION \
            --dashboard-revision $DASHBOARD_REVISION \
            --agent-revision     $AGENT_REVISION \
            --assistant-revision $ASSISTANT_REVISION

      - name: Install necessary dependencies in the AWS instance to create the OVA
        run: |
          ssh -p ${{ env.INSTANCE_PORT }} \
              -i ${{ env.INSTANCE_KEY }} \
              -o 'StrictHostKeyChecking no' \
              ${{ env.INSTANCE_USER }}@${{ env.INSTANCE_HOSTNAME }} << EOF
            set -e
            sudo yum install -y python3-pip git
            sudo pip3 install hatch
          EOF

      - name: Clone repo on remote instance
        run: |
          ssh -p ${{ env.INSTANCE_PORT }} \
              -i ${{ env.INSTANCE_KEY }} \
              -o 'StrictHostKeyChecking no' \
              ${{ env.INSTANCE_USER }}@${{ env.INSTANCE_HOSTNAME }} << EOF
            set -e
            git clone -b ${{ inputs.wazuh_virtual_machines_reference }} ${{ env.WVM_REPOSITORY_PATH }}
          EOF

      - name: Copy artifacts URLs file to remote instance
        run: |
          scp -P ${{ env.INSTANCE_PORT }} \
              -i ${{ env.INSTANCE_KEY }} \
              "${{ env.LOCAL_ARTIFACT_URLS_FILEPATH }}" \
              ${{ env.INSTANCE_USER }}@${{ env.INSTANCE_HOSTNAME }}:~/${{ env.WVM_REPO_NAME }}

      - name: Run the OVA PreConfigurer module
        run: |
          ssh -p ${{ env.INSTANCE_PORT }} \
              -i ${{ env.INSTANCE_KEY }} \
              -o 'StrictHostKeyChecking no' \
              ${{ env.INSTANCE_USER }}@${{ env.INSTANCE_HOSTNAME }} << EOF
            set -e
            cd ${{ env.WVM_REPO_NAME }}
            sudo hatch run dev-ova-pre-configurer:run
          EOF

      - name: Run the OVA PostConfigurer module
        run: |
          ssh -p ${{ env.INSTANCE_PORT }} \
              -i ${{ env.INSTANCE_KEY }} \
              -o 'StrictHostKeyChecking no' \
              ${{ env.INSTANCE_USER }}@${{ env.INSTANCE_HOSTNAME }} << EOF
            set -e
            cd ${{ env.WVM_REPO_NAME }}
            sudo vagrant ssh -c 'cd /tmp/wazuh-virtual-machines && sudo hatch run dev-ova-post-configurer:run --packages-url-path ${{ env.ARTIFACT_URLS_FILENAME }}'
          EOF

      - name: Stop the Vagrant VM, modify the network and export it as OVA
        run: |
          ssh -p ${{ env.INSTANCE_PORT }} \
              -i ${{ env.INSTANCE_KEY }} \
              -o 'StrictHostKeyChecking no' \
              ${{ env.INSTANCE_USER }}@${{ env.INSTANCE_HOSTNAME }} << EOF
            set -e
            cd ${{ env.WVM_REPO_NAME }}
            sudo vagrant halt
            sudo vboxmanage modifyvm ova_base --nic2 hostonly
            sudo vboxmanage modifyvm ova_base --cableconnected2 on
            sudo vboxmanage export ova_base --output ${{ env.FILENAME_OVA }}
            sudo chmod 0755 ${{ env.FILENAME_OVA }}
          EOF

      - name: Getting OVA from AWS instance
        run: |
          scp -P ${{ env.INSTANCE_PORT }} \
              -i ${{ env.INSTANCE_KEY }} \
              ${{ env.INSTANCE_USER }}@${{ env.INSTANCE_HOSTNAME }}:~/${{ env.WVM_REPO_NAME }}/${{ env.FILENAME_OVA }} ${{ github.workspace }}/${{ env.FILENAME_OVA }}
      - name: Getting Amazon Linux 2023 Vagrant Box from AWS instance
        run: |
          scp -P ${{ env.INSTANCE_PORT }} \
              -i ${{ env.INSTANCE_KEY }} \
              ${{ env.INSTANCE_USER }}@${{ env.INSTANCE_HOSTNAME }}:~/${{ env.WVM_REPO_NAME }}/${{ env.BOX_DEFAULT_NAME }}.box ${{ github.workspace }}/${{ env.FILENAME_BOX }}

      - name: Standarizing OVA
        run: |
          sudo chmod 0777 ${{ env.OVA_SCRIPTS_PATH }}/${{ env.OVA_SET_DEFAULT_SCRIPT_NAME }}
          sed -i "s|ovf:capacity=\"40\"|ovf:capacity=\"50\"|g" ${{ env.OVA_SCRIPTS_PATH }}/${{ env.OVA_OVF_TEMPLATE_NAME }}
          sudo bash ${{ env.OVA_SCRIPTS_PATH }}/${{ env.OVA_SET_DEFAULT_SCRIPT_NAME }} "${{ env.OVA_SCRIPTS_PATH }}/" "${{ github.workspace }}/${{ env.FILENAME_OVA }}" "${{ github.workspace }}/${{ env.FILENAME_OVA }}" ${{ env.OVA_SCRIPTS_PATH }}/${{ env.OVA_OVF_TEMPLATE_NAME }} "${{ env.WAZUH_VERSION }}"

      - name: Upload built OVA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-ova
          path: ${{ github.workspace }}/${{ env.FILENAME_OVA }}

      - name: Upload built BOX as artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-box
          path: ${{ github.workspace }}/${{ env.FILENAME_BOX }}

      - name: Upload Allocator directory as artifact
        if: always() && steps.alloc_vm_ova.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: allocator-info
          path: ${{ env.ALLOCATOR_PATH }}

  upload_ova:
    needs: build
    runs-on:
      group: wz-linux-amd64
    strategy:
      matrix:
        include: ${{ fromJson(needs.build.outputs.ova_matrix) }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_OVA_ROLE }}
          role-session-name: "OVA-Upload"
          aws-region: "${{ env.AWS_REGION }}"

      - name: Download built OVA
        uses: actions/download-artifact@v4
        with:
          name: built-ova

      - name: Upload OVA to S3
        run: |
          SOURCE_FILE="${{ needs.build.outputs.ova_source_filename }}"
          DEST_FILE="${{ matrix.filename }}"

          if [ "$SOURCE_FILE" != "$DEST_FILE" ]; then
            cp "$SOURCE_FILE" "$DEST_FILE"
          fi

          aws s3 cp --quiet "$DEST_FILE" "s3://${{ env.S3_BUCKET_TO_STORE_OVA }}/${{ env.S3_PATH_TO_STORE_OVA }}/$DEST_FILE"
          echo "S3 OVA URI: s3://${{ env.S3_BUCKET_TO_STORE_OVA }}/${{ env.S3_PATH_TO_STORE_OVA }}/$DEST_FILE"

      - name: Generate and upload sha512
        if: ${{ inputs.checksum == true }}
        run: |
          DEST_FILE="${{ matrix.filename }}"
          sha512sum "$DEST_FILE" > "${DEST_FILE}.sha512"
          aws s3 cp --quiet "${DEST_FILE}.sha512" "s3://${{ env.S3_BUCKET_TO_STORE_OVA }}/${{ env.S3_PATH_TO_STORE_OVA }}/${DEST_FILE}.sha512"
          echo "S3 sha512 URI: s3://${{ env.S3_BUCKET_TO_STORE_OVA }}/${{ env.S3_PATH_TO_STORE_OVA }}/${DEST_FILE}.sha512"

  upload_box:
    needs: build
    runs-on:
      group: wz-linux-amd64
    strategy:
      matrix:
        include: ${{ fromJson(needs.build.outputs.box_matrix) }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_OVA_ROLE }}
          role-session-name: "BOX-Upload"
          aws-region: "${{ env.AWS_REGION }}"

      - name: Download built BOX
        uses: actions/download-artifact@v4
        with:
          name: built-box

      - name: Upload BOX to S3
        run: |
          SOURCE_FILE="${{ needs.build.outputs.box_source_filename }}"
          DEST_FILE="${{ matrix.filename }}"

          if [ "$SOURCE_FILE" != "$DEST_FILE" ]; then
            cp "$SOURCE_FILE" "$DEST_FILE"
          fi

          aws s3 cp --quiet "$DEST_FILE" "s3://${{ env.S3_BUCKET_TO_STORE_OVA }}/${{ env.S3_PATH_TO_STORE_OVA }}/$DEST_FILE"
          echo "S3 BOX URI: s3://${{ env.S3_BUCKET_TO_STORE_OVA }}/${{ env.S3_PATH_TO_STORE_OVA }}/$DEST_FILE"

      - name: Generate and upload sha512
        if: ${{ inputs.checksum == true }}
        run: |
          DEST_FILE="${{ matrix.filename }}"
          sha512sum "$DEST_FILE" > "${DEST_FILE}.sha512"
          aws s3 cp --quiet "${DEST_FILE}.sha512" "s3://${{ env.S3_BUCKET_TO_STORE_OVA }}/${{ env.S3_PATH_TO_STORE_OVA }}/${DEST_FILE}.sha512"
          echo "S3 sha512 URI: s3://${{ env.S3_BUCKET_TO_STORE_OVA }}/${{ env.S3_PATH_TO_STORE_OVA }}/${DEST_FILE}.sha512"

  cleanup:
    needs: [build, upload_ova, upload_box]
    if: always() && needs.build.result != 'skipped'
    runs-on:
      group: wz-linux-amd64
    steps:
      - name: Checkout wazuh/wazuh-automation repository
        uses: actions/checkout@v4
        with:
          repository: wazuh/wazuh-automation
          ref: ${{ inputs.wazuh_automation_reference }}
          token: ${{ secrets.GH_CLONE_TOKEN }}
          path: wazuh-automation

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install allocator requirements
        run: pip3 install -r wazuh-automation/deployability/deps/requirements.txt

      - name: Download Allocator directory
        uses: actions/download-artifact@v4
        with:
          name: allocator-info
          path: ${{ env.ALLOCATOR_PATH }}

      - name: Delete allocated VM
        if: inputs.destroy == true
        run: python3 wazuh-automation/deployability/modules/allocation/main.py --action delete --track-output ${{ env.ALLOCATOR_PATH }}/track.yml

      - name: Compress Allocator directory
        id: generate_artifacts
        if: inputs.destroy == false
        run: zip -P "${{ secrets.ZIP_ARTIFACTS_PASSWORD }}" -r ${{ env.ALLOCATOR_PATH }}.zip ${{ env.ALLOCATOR_PATH }}
        continue-on-error: true

      - name: Upload Allocator directory as artifact
        if: steps.generate_artifacts.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: instance_info
          path: ${{ env.ALLOCATOR_PATH }}.zip
